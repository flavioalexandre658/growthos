services:
  app:
    image: registry.digitalocean.com/groware/groware:latest
    restart: unless-stopped
    env_file: .env
    environment:
      - DISABLE_WORKERS=true
    expose:
      - "3000"
    depends_on:
      - redis
    deploy:
      resources:
        limits:
          memory: 1536M

  worker:
    image: registry.digitalocean.com/groware/groware:latest
    restart: unless-stopped
    env_file: .env
    command: node -e "require('./workers/register').startWorkers(); require('./utils/pageview-buffer').startPageviewFlushTimer(); process.on('SIGTERM', async () => { require('./utils/pageview-buffer').stopPageviewFlushTimer(); await require('./utils/pageview-buffer').flushPageviewBuffer().catch(()=>{}); await require('./workers/register').stopWorkers(); process.exit(0); }); setInterval(()=>{}, 60000);"
    depends_on:
      - redis
    deploy:
      resources:
        limits:
          memory: 1024M

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 512mb --maxmemory-policy noeviction --save 60 1000 --save 300 100
    volumes:
      - redis_data:/data

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  caddy_data:
  caddy_config:
  redis_data:
