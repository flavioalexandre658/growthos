name: Deploy to DigitalOcean

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 30m
          script: |
            set -e

            echo "🚀 Deploy Groware PRODUÇÃO"
            git config --global --add safe.directory /opt/groware-src
            cd /opt/groware-src

            git fetch origin main
            git reset --hard origin/main

            set -a; source /opt/groware/.env; set +a

            docker build \
              --build-arg NEXT_PUBLIC_API_URL="$NEXT_PUBLIC_API_URL" \
              --build-arg NEXT_PUBLIC_GTM_ID="$NEXT_PUBLIC_GTM_ID" \
              --build-arg NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY="$NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY" \
              --build-arg NEXT_PUBLIC_GROWARE_KEY="$NEXT_PUBLIC_GROWARE_KEY" \
              --build-arg DATABASE_URL="$DATABASE_URL" \
              --build-arg NEXTAUTH_SECRET="$NEXTAUTH_SECRET" \
              --build-arg NEXTAUTH_URL="$NEXTAUTH_URL" \
              -t groware:latest .

            cd /opt/groware
            docker compose up -d --force-recreate app
            docker image prune -f

            echo "✅ Deploy concluído"
